# runner:
#   - catalysis-zie.inria.fr / macOSX-arm64 / self-hosted
#
#

name: CI Build and Test

on:
  push:
    branches: [ master, develop , feature/*]
  pull_request:
    branches: [ master, develop , feature/*]
  workflow_dispatch:  # permit manual launch

# # stop previous workflows in case on multiple pushes
# concurrency:
#   group: ${{ github.workflow }}-${{ github.ref }}
#   cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, Test & Coverage
    strategy:
      fail-fast: false
      matrix:
        os:
          - self-hosted
          - ubuntu-latest
          - macos-15-intel
          # - macos-latest
          # - windows-latest
    runs-on: ${{ matrix.os }}

    env:
      PATH: /usr/bin:/bin:/usr/sbin:/sbin:/usr/local/bin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pixi
        if: matrix.os != 'self-hosted'
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.63.2
          cache: true

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # for git info

      - name: Configure project
        run: pixi run configure

      - name: Build project
        run: pixi run build

      - name: Run regression tests
        if: matrix.os == 'ubuntu-latest'
        run: pixi run test_regression

      - name: Run PARTIAL regression tests
        if: matrix.os != 'ubuntu-latest'
        run: pixi run test_align

      - name: Run C++ tests
        run: pixi run test

      - name: Generate coverage report
        if: matrix.os == 'self-hosted'
        run: pixi run coverage
        continue-on-error: true  # do not block if coverage fails

      - name: Upload coverage to GitHub
        if: matrix.os == 'self-hosted'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage.xml
            .coverage
          retention-days: 30
          if-no-files-found: warn

      - name: Build conda package
        run: pixi build --output-dir=bundle

      - name: Set label
        run: |
          if [[ "${{ github.ref_name }}" == "master" ]]; then
          echo "LABEL=main" >> $GITHUB_ENV
          else
          echo "LABEL=test" >> $GITHUB_ENV
          fi

      - name: Upload conda package
        if: github.ref_name == 'master'
        env:
          ANACONDA_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
        run: pixi run upload $ANACONDA_TOKEN $LABEL igor-immuno

      - name: Comment coverage on PR
        if: ${{ (matrix.os == 'self-hosted') && (github.event_name == 'pull_request') }}
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 60
        continue-on-error: true

      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** $(hostname)" >> $GITHUB_STEP_SUMMARY
          echo "- **Pixi version:** $(pixi --version)" >> $GITHUB_STEP_SUMMARY
