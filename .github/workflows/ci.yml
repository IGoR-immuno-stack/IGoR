#
# runner:
#   - catalysis-zie.inria.fr / macOSX-arm64 / self-hosted
#
#

name: CI Build and Test

on:
  push:
    branches: [ master, develop , feature/*]
  pull_request:
    branches: [ master, develop , feature/*]
  workflow_dispatch:  # permit manual launch

# # stop previous workflows in case on multiple pushes
# concurrency:
#   group: ${{ github.workflow }}-${{ github.ref }}
#   cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, Test & Coverage
    strategy:
      fail-fast: false
      matrix:
        os:
          - self-hosted
          - ubuntu-latest
          - macos-15-intel
          # - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash
    steps:
      - name: Set Unix PATH
        if: matrix.os != 'windows-latest'
        run: echo "PATH=/usr/bin:/bin:/usr/sbin:/sbin:/usr/local/bin" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pixi
        if: matrix.os != 'self-hosted'
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.69.0
          cache: true

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # for git info

      - name: Initialize submodules
        run: pixi run submodule-update

      - name: Configure project
        if: matrix.os != 'ubuntu-latest'
        run: pixi run configure

      - name: Build project
        if: matrix.os != 'ubuntu-latest'
        run: pixi run build

      - name: Debug Windows test bootstrap
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          pixi run python - <<'PY'
          import os
          import pathlib
          import shutil
          import subprocess

          def run(args, title):
              print(f"\n=== {title} ===")
              print("CMD:", " ".join(args))
              p = subprocess.run(args, text=True, capture_output=True)
              print("RC:", p.returncode)
              if p.stdout:
                  print(p.stdout)
              if p.stderr:
                  print("STDERR:")
                  print(p.stderr)

          print("CONDA_PREFIX =", os.environ.get("CONDA_PREFIX"))
          print("PATH =", os.environ.get("PATH"))

          bindir = pathlib.Path("build/bin")
          print("\nDLLs in build/bin:")
          for path in sorted(bindir.glob("*.dll")):
              print(" ", path.name)

          envbin = pathlib.Path(os.environ["CONDA_PREFIX"]) / "Library" / "bin"
          for pattern in ("gsl*.dll", "libomp*.dll", "libiomp5md.dll", "vcomp*.dll", "libgomp*.dll"):
              print(f"\n{pattern} in CONDA env:")
              for path in sorted(envbin.glob(pattern)):
                  print(" ", path.name)

          exe = bindir / "igor_tests.exe"
          if exe.exists():
              run([str(exe), "--list-tests"], "igor_tests bootstrap")
          else:
              print("igor_tests.exe missing")

          model_exe = bindir / "model_tests.exe"
          if model_exe.exists():
              run([str(model_exe), "--list-tests"], "model_tests bootstrap")
          else:
              print("model_tests.exe missing")

          # where.exe diagnostics
          where_exe = shutil.which("where")
          if where_exe:
              for name in ("libomp.dll", "libomp140.x86_64.dll",  "libiomp5md.dll", "vcomp140.dll", "libgomp-1.dll"):
                  run([where_exe, name], f"where {name}")

          # dumpbin diagnostics
          dumpbin = shutil.which("dumpbin")
          if dumpbin:
              run([dumpbin, "/DEPENDENTS", str(exe)], "dumpbin igor_tests.exe")
              run([dumpbin, "/DEPENDENTS", str(bindir / "igorCore.dll")], "dumpbin igorCore.dll")
              run([dumpbin, "/DEPENDENTS", str(model_exe)], "dumpbin model_tests.exe")
              run([dumpbin, "/DEPENDENTS", str(bindir / "igorModel.dll")], "dumpbin igorModel.dll")
          gsl_dll = envbin / "gsl-28.dll"
          if gsl_dll.exists() and dumpbin:
            run([dumpbin, "/DEPENDENTS", str(gsl_dll)], "dumpbin gsl-28.dll (conda)")
          else:
              print("dumpbin not found in PATH")
          conda_lib_bin = pathlib.Path(os.environ["CONDA_PREFIX"]) / "Library" / "bin"
          for dll_name in ("libcblas.dll", "libopenblas.dll", "openblas.dll", "libiomp5md.dll"):
            dll = conda_lib_bin / dll_name
            if dll.exists() and dumpbin:
              run([dumpbin, "/DEPENDENTS", str(dll)], f"dumpbin {dll_name} (conda)")

          # OpenMP conflict probe
          env = os.environ.copy()
          env["KMP_DUPLICATE_LIB_OK"] = "TRUE"
          print("\n=== test with KMP_DUPLICATE_LIB_OK ===")
          p = subprocess.run([str(exe), "--list-tests"], text=True, capture_output=True, env=env)
          print("\n=== model_tests with KMP_DUPLICATE_LIB_OK ===")
          p = subprocess.run([str(model_exe), "--list-tests"], text=True, capture_output=True, env=env)
          print("RC:", p.returncode)
          if p.stdout:
              print(p.stdout)
          if p.stderr:
              print("STDERR:")
              print(p.stderr)
          PY

      - name: Configure project
        if: matrix.os == 'ubuntu-latest'
        run: pixi run configure_debug

      - name: Build project
        if: matrix.os == 'ubuntu-latest'
        run: pixi run build_debug

      - name: Run C++ tests
        if: matrix.os != 'ubuntu-latest'
        run: pixi run test

      - name: Run C++ tests
        if: matrix.os == 'ubuntu-latest'
        run: pixi run test_debug

      - name: Generate coverage report
        if: matrix.os == 'self-hosted'
        run: pixi run coverage
        continue-on-error: true  # do not block if coverage fails

      - name: Upload coverage to GitHub
        if: matrix.os == 'self-hosted'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage.xml
            .coverage
          retention-days: 30
          if-no-files-found: warn

      - name: Run regression tests
        if: matrix.os == 'ubuntu-latest'
        run: pixi run test_regression

      - name: Run PARTIAL regression tests
        if: matrix.os != 'ubuntu-latest'
        run: pixi run test_align

      - name: Build conda package
        run: pixi build --output-dir=bundle

      - name: Set label
        run: |
          if [[ "${{ github.ref_name }}" == "master" ]]; then
          echo "LABEL=main" >> $GITHUB_ENV
          else
          echo "LABEL=test" >> $GITHUB_ENV
          fi

      - name: Upload conda package
        if: github.ref_name == 'master'
        env:
          ANACONDA_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
        run: pixi run upload $ANACONDA_TOKEN $LABEL igor-immuno

      - name: Comment coverage on PR
        if: ${{ (matrix.os == 'self-hosted') && (github.event_name == 'pull_request') }}
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 60
        continue-on-error: true

      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** $(hostname)" >> $GITHUB_STEP_SUMMARY
          echo "- **Pixi version:** $(pixi --version)" >> $GITHUB_STEP_SUMMARY
