#   - catalysis-zie.inria.fr / macOSX-arm64 / self-hosted
#
#

name: CI Build and Test

on:
  push:
    branches: [ main, develop , feature/new_arch]
  pull_request:
    branches: [ main, develop , feature/*]
  workflow_dispatch:  # permit manual launch

# # stop previous workflows in case on multiple pushes
# concurrency:
#   group: ${{ github.workflow }}-${{ github.ref }}
#   cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, Test & Coverage
    strategy:
      fail-fast: false
      matrix:
        os:
          - self-hosted
          - ubuntu-latest
          - macos-latest
          # - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Clean previous Pixi installation (macOS only)
        if: runner.os == 'macOS'
        run: rm -rf ~/.pixi

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.39.0
          cache: true

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # for git info

      - name: Configure project
        run: pixi run configure

      - name: Build project
        run: pixi run build

      - name: Run regression tests
        run: pixi run test_regression

      - name: Run C++ tests
        run: pixi run test

      - name: Generate coverage report
        run: pixi run coverage
        continue-on-error: true  # do not block if coverage fails

      - name: Upload coverage to GitHub
        if: always()  # always run (even on previous errors)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage.xml
            .coverage
          retention-days: 30
          if-no-files-found: warn

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 60
        continue-on-error: true

      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** $(hostname)" >> $GITHUB_STEP_SUMMARY
          echo "- **Pixi version:** $(pixi --version)" >> $GITHUB_STEP_SUMMARY
