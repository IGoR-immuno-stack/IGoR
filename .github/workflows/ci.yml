#
# runner:
#   - catalysis-zie.inria.fr / macOSX-arm64 / self-hosted
#
#

name: CI Build and Test

on:
  push:
    branches: [ master, develop , feature/*]
  pull_request:
    branches: [ master, develop , feature/*]
  workflow_dispatch:  # permit manual launch

# # stop previous workflows in case on multiple pushes
# concurrency:
#   group: ${{ github.workflow }}-${{ github.ref }}
#   cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, Test & Coverage
    strategy:
      fail-fast: false
      matrix:
        os:
          - self-hosted
          - ubuntu-latest
          - macos-15-intel
          # - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash
    steps:
      - name: Set Unix PATH
        if: matrix.os != 'windows-latest'
        run: echo "PATH=/usr/bin:/bin:/usr/sbin:/sbin:/usr/local/bin" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pixi
        if: matrix.os != 'self-hosted'
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.69.0
          cache: true

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # for git info

      - name: Initialize submodules
        run: pixi run submodule-update

      - name: Configure project
        if: matrix.os != 'ubuntu-latest'
        run: pixi run configure

      - name: Build project
        if: matrix.os != 'ubuntu-latest'
        run: pixi run build

      - name: Debug Windows test bootstrap
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          pixi run python - <<'PY'
          import os
          import pathlib
          import subprocess

          print("CONDA_PREFIX =", os.environ.get("CONDA_PREFIX"))
          print("PATH =", os.environ.get("PATH"))

          bindir = pathlib.Path("build/bin")
          print("DLLs in build/bin:")
          if bindir.exists():
              for path in sorted(bindir.glob("*.dll")):
                  print("  ", path.name)

          envbin = pathlib.Path(os.environ["CONDA_PREFIX"]) / "Library" / "bin"
          for pattern in ("gsl*.dll", "*omp*.dll", "*vcomp*.dll"):
              print(f"{pattern} in CONDA env:")
              for path in sorted(envbin.glob(pattern)):
                  print("  ", path.name)

          for exe_name in ("igor_tests.exe", "model_tests.exe", "math_tests.exe", "streaming_tests.exe"):
              exe = bindir / exe_name
              if not exe.exists():
                  print(f"{exe_name}: missing")
                  continue
              print(f"Running {exe_name} --list-test-names-only")
              result = subprocess.run([str(exe), "--list-test-names-only"], text=True)
              print(f"{exe_name} exit code: {result.returncode}")
          PY

          echo "=== where openmp runtimes ==="
          pixi run cmd /c "where libomp.dll || exit /b 0"
          pixi run cmd /c "where libiomp5md.dll || exit /b 0"
          pixi run cmd /c "where vcomp140.dll || exit /b 0"
          pixi run cmd /c "where libgomp-1.dll || exit /b 0"

          echo "=== dumpbin dependents (igor_tests.exe) ==="
          pixi run cmd /c "\"%VSINSTALLDIR%\\VC\\Tools\\MSVC\\14.44.35207\\bin\\Hostx64\\x64\\dumpbin.exe\" /DEPENDENTS build\\bin\\igor_tests.exe"

          echo "=== dumpbin dependents (igorCore.dll) ==="
          pixi run cmd /c "\"%VSINSTALLDIR%\\VC\\Tools\\MSVC\\14.44.35207\\bin\\Hostx64\\x64\\dumpbin.exe\" /DEPENDENTS build\\bin\\igorCore.dll"

          echo "=== test with KMP_DUPLICATE_LIB_OK ==="
          pixi run cmd /c "set KMP_DUPLICATE_LIB_OK=TRUE && build\\bin\\igor_tests.exe --list-test-names-only && echo ExitCode=%ERRORLEVEL%"

      - name: Configure project
        if: matrix.os == 'ubuntu-latest'
        run: pixi run configure_debug

      - name: Build project
        if: matrix.os == 'ubuntu-latest'
        run: pixi run build_debug

      - name: Run C++ tests
        if: matrix.os != 'ubuntu-latest'
        run: pixi run test

      - name: Run C++ tests
        if: matrix.os == 'ubuntu-latest'
        run: pixi run test_debug

      - name: Generate coverage report
        if: matrix.os == 'self-hosted'
        run: pixi run coverage
        continue-on-error: true  # do not block if coverage fails

      - name: Upload coverage to GitHub
        if: matrix.os == 'self-hosted'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage.xml
            .coverage
          retention-days: 30
          if-no-files-found: warn

      - name: Run regression tests
        if: matrix.os == 'ubuntu-latest'
        run: pixi run test_regression

      - name: Run PARTIAL regression tests
        if: matrix.os != 'ubuntu-latest'
        run: pixi run test_align

      - name: Build conda package
        run: pixi build --output-dir=bundle

      - name: Set label
        run: |
          if [[ "${{ github.ref_name }}" == "master" ]]; then
          echo "LABEL=main" >> $GITHUB_ENV
          else
          echo "LABEL=test" >> $GITHUB_ENV
          fi

      - name: Upload conda package
        if: github.ref_name == 'master'
        env:
          ANACONDA_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
        run: pixi run upload $ANACONDA_TOKEN $LABEL igor-immuno

      - name: Comment coverage on PR
        if: ${{ (matrix.os == 'self-hosted') && (github.event_name == 'pull_request') }}
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 60
        continue-on-error: true

      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** $(hostname)" >> $GITHUB_STEP_SUMMARY
          echo "- **Pixi version:** $(pixi --version)" >> $GITHUB_STEP_SUMMARY
